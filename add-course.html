<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - Course Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Academic Manager</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">My Courses</a>
        <a href="add-course.html">Add Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <main>
        <section>
            <h2>Add a New Course</h2>
            <p>Fill in the details below to add a new course to your organizer.</p>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="courseName">Course Name:</label>
                    <input type="text" id="courseName" name="courseName" placeholder="e.g. Data Structures" required>
                </div>

                <div class="form-group">
                    <label for="instructor">Instructor Name:</label>
                    <input type="text" id="instructor" name="instructor" placeholder="Dr. Name" required>
                </div>

                <div class="form-group">
                    <label for="credits">Credit Hours:</label>
                    <input type="number" id="credits" name="credits" min="1" max="5" required>
                </div>

                <div class="form-group">
                    <label for="notes">Notes:</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Any extra details..."></textarea>
                </div>

                <button type="submit">Add Course</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Student Portfolio - Built with HTML & CSS</p>
    </footer>

</body>
</html>
